name: Analyze WPBA Processed Outputs

on:
  workflow_dispatch:
    inputs:
      top_n:
        description: "Number of leaders to keep per metric"
        required: true
        default: "5"
      min_player_minutes:
        description: "Minimum total minutes for player analysis leaderboards"
        required: true
        default: "40"

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Rebuild processed datasets
        run: python src/build_wpba_helpers.py --input data/wpba_stats_2026_clean.xlsx --output-dir outputs

      - name: Run analysis
        run: python src/analyze_wpba_outputs.py --input-dir outputs --output-dir analysis --top-n "${{ inputs.top_n }}" --min-player-minutes "${{ inputs.min_player_minutes }}"

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wpba-analysis-artifacts
          path: analysis/
